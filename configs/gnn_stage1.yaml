# ─────────────────────────────────────────────────────────────────────────────
# Stage 1: GNN Formula Encoder — ARQMath Task 2 (Years 1 & 2)
# Hardware target: 2× A100 (48 GB each), launched via:
#   torchrun --nproc_per_node=2 -m src.retrieval.train.train --config configs/gnn_stage1.yaml
# ─────────────────────────────────────────────────────────────────────────────

# ── Data ────────────────────────────────────────────────────────────────────
data:
  # Path to pre-mined BM25 hard negatives (generated by mine_negatives.py).
  # Set to null to skip hard negatives and train on in-batch negatives only.
  negatives_path: data/processed/task2_hard_negatives.json

# ── Model ───────────────────────────────────────────────────────────────────
model:
  # Dimension of the learnable node-type embedding lookup table.
  # 97 unique OPT tag types; 64-dim is sufficient for this vocabulary.
  node_emb_dim: 64

  # Hidden units per attention head inside each GATConv layer.
  hidden_dim: 128

  # Number of attention heads per GATConv layer.
  # Each layer outputs num_heads × hidden_dim = 512 per node.
  num_heads: 4

  # Number of stacked GATConv layers.
  # 4 layers = receptive field covers trees up to depth 4,
  # which handles the majority of OPT trees in the corpus.
  num_layers: 4

  # Final embedding dimension (after the projection MLP).
  # Must match the CLIP output dimension if we later align with CLIP (Stage 3).
  output_dim: 256

  # Dropout applied between GATConv layers and inside the projection MLP.
  dropout: 0.1

# ── Training ────────────────────────────────────────────────────────────────
training:
  # Per-GPU batch size.  2 GPUs × 128 = 256 effective in-batch negatives,
  # which is large enough for InfoNCE to converge reliably.
  batch_size: 128

  # Total training epochs.  Early stopping will terminate before this if
  # validation loss plateaus.
  epochs: 50

  # Peak learning rate for the OneCycleLR scheduler.
  lr: 3.0e-4

  # AdamW weight decay.
  weight_decay: 1.0e-4

  # Fraction of total steps used for the linear warmup phase.
  warmup_ratio: 0.05

  # Initial value of the learnable InfoNCE temperature τ.
  # 0.07 is the standard CLIP initialisation.
  temperature_init: 0.07

  # Number of pre-mined BM25 hard negatives to include per query.
  # These are appended to the in-batch negatives in the InfoNCE denominator.
  num_hard_negatives: 8

  # Early stopping: stop if val loss does not improve for this many epochs.
  early_stopping_patience: 5

  # DataLoader worker processes per GPU.
  num_workers: 4

  # Random seed for dataset shuffling and negative sampling.
  seed: 42

  # Directory where best.pt and latest.pt are written.
  checkpoint_dir: checkpoints/gnn_stage1
